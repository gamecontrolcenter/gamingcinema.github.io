<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cinema Mode &mdash; Gaming Cinema</title>
  <meta name="description" content="Gaming Cinema - Cinema Mode. Every PS5 Pro 4K walkthrough played in full, start to finish, back to back.">
  <meta name="robots" content="noindex">
  <meta property="og:title" content="Gaming Cinema - Cinema Mode">
  <meta property="og:type" content="website">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="brand">
        <a href="index.html">Gaming Cinema</a>
        <span class="tagline">PS5 Pro &middot; 4K HDR &middot; PSSR &middot; No Commentary</span>
      </div>
      <nav class="primary">
        <a href="index.html#games">Walkthroughs</a>
        <a href="upcoming.html">Upcoming</a>
        <a href="live.html" class="nav-live">Live</a>
        <a href="https://www.youtube.com/@4k_gaming_cinema" target="_blank" rel="noopener">YouTube</a>
      </nav>
    </div>
  </header>

  <div class="live-page">
    <a href="index.html" class="back-link">&larr; All walkthroughs</a>
    <div class="mode-switch">
      <a href="live.html" class="mode-tab">Store Mode</a>
      <a href="cinema.html" class="mode-tab active">Cinema Mode</a>
    </div>
    <div id="liveContent"></div>
  </div>

  <footer class="site-footer">
    <p>&copy; 2026 Gaming Cinema &middot; No-commentary PS5 Pro 4K cinematic walkthroughs &middot; <a href="https://www.youtube.com/@4k_gaming_cinema" target="_blank" rel="noopener">YouTube Channel</a></p>
  </footer>

  <script>
  (function () {
    'use strict';

    var SHOW_UPNEXT = 6;
    var SCHEDULE_AHEAD = 8;

    var pool = [], bag = [], schedule = [], current = null;
    var player = null, apiReady = false, live = false;
    var muted = localStorage.getItem('gc_live_muted') === '1';

    var elContent = document.getElementById('liveContent');

    function esc(s) {
      return String(s).replace(/[&<>"']/g, function (c) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
      });
    }
    function shuffle(a) {
      for (var i = a.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var t = a[i]; a[i] = a[j]; a[j] = t;
      }
      return a;
    }
    function partTxt(e) {
      return e.partCount > 1 ? 'Part ' + e.partIndex + ' / ' + e.partCount : 'Full walkthrough';
    }

    function buildPool(games) {
      var p = [];
      games.forEach(function (g) {
        if (g.ageRestricted) return;
        (g.videos || []).forEach(function (v, i) {
          p.push({
            videoId: v.id, gameTitle: g.title, gameSlug: g.slug, year: g.year,
            partIndex: i + 1, partCount: (g.videos || []).length
          });
        });
      });
      return p;
    }
    function draw() {
      if (bag.length === 0) bag = shuffle(pool.slice());
      return bag.pop();
    }
    function fillSchedule() {
      while (schedule.length < SCHEDULE_AHEAD && pool.length) {
        var e = draw();
        if (!e) break;
        schedule.push(e);
      }
    }

    function renderStage() {
      elContent.innerHTML =
        '<div class="live-head">'
          + '<h1>Cinema Mode</h1>'
          + '<p class="series-meta">Every PS5 Pro 4K walkthrough, played in full - start to finish, back to back. '
          + 'No ads, no settings; press play and lean back. '
          + '<span id="poolCount">' + pool.length + '</span> videos in rotation.</p>'
        + '</div>'
        + '<div class="live-stage">'
          + '<div class="player-wrap overlayed" id="playerWrap">'
            + '<div id="player"></div>'
            + '<div class="live-badge"><span class="bdot"></span> LIVE</div>'
            + '<div class="player-overlay" id="overlay">'
              + '<div class="overlay-card">'
                + '<h3>Cinema Mode</h3>'
                + '<p>A continuous, no-distraction channel of every walkthrough on the channel - '
                + 'each one played in full, start to finish. Press play and lean back.</p>'
                + '<div class="overlay-actions">'
                  + '<button class="overlay-btn primary" id="goLiveBtn" disabled>Loading&hellip;</button>'
                + '</div>'
              + '</div>'
            + '</div>'
          + '</div>'
          + '<div class="live-controls">'
            + '<div class="live-np" id="liveNp"></div>'
            + '<div class="live-actions">'
              + '<button class="np-btn" id="muteBtn">' + (muted ? 'Unmute' : 'Mute') + '</button>'
              + '<button class="np-btn primary" id="skipBtn">Skip &#9197;</button>'
            + '</div>'
          + '</div>'
        + '</div>'
        + '<p class="cinema-hint">Tip: use the fullscreen button on the player itself - it works on phones, tablets and desktop.</p>'
        + '<div class="upnext"><h2>Up Next</h2><div class="upnext-list" id="upnextList"></div></div>';

      document.getElementById('goLiveBtn').addEventListener('click', startLive);
      document.getElementById('skipBtn').addEventListener('click', function () { if (live) advance(); });
      document.getElementById('muteBtn').addEventListener('click', toggleMute);
    }

    function renderUpNext() {
      var list = document.getElementById('upnextList');
      if (!list) return;
      list.innerHTML = schedule.slice(0, SHOW_UPNEXT).map(function (e, i) {
        return '<div class="upnext-item">'
          + '<span class="un-thumb" style="background-image:url(\'https://i.ytimg.com/vi/'
            + e.videoId + '/mqdefault.jpg\')"><span class="un-pos">' + (i + 1) + '</span></span>'
          + '<span class="un-info"><span class="un-title">' + esc(e.gameTitle) + '</span>'
          + '<span class="un-sub">' + partTxt(e) + '</span></span>'
          + '</div>';
      }).join('');
    }
    function renderNp() {
      var n = document.getElementById('liveNp');
      if (!n || !current) return;
      n.innerHTML = '<span class="np-now">Now playing</span>'
        + '<span class="np-game">' + esc(current.gameTitle) + ' &middot; ' + partTxt(current) + '</span>';
    }
    function toggleMute() {
      muted = !muted;
      localStorage.setItem('gc_live_muted', muted ? '1' : '0');
      if (player) { if (muted) player.mute(); else player.unMute(); }
      var b = document.getElementById('muteBtn');
      if (b) b.textContent = muted ? 'Unmute' : 'Mute';
    }

    function playCurrent() {
      renderNp();
      renderUpNext();
      if (apiReady && player && current) {
        player.loadVideoById({ videoId: current.videoId, startSeconds: 0 });
        if (muted) player.mute(); else player.unMute();
      }
    }
    function advance() {
      if (!schedule.length) fillSchedule();
      if (!schedule.length) return;
      current = schedule.shift();
      fillSchedule();
      playCurrent();
    }
    function startLive() {
      if (live) return;
      live = true;
      var pw = document.getElementById('playerWrap');
      if (pw) pw.classList.remove('overlayed');
      advance();
    }

    window.onYouTubeIframeAPIReady = function () {
      player = new YT.Player('player', {
        width: '100%',
        height: '100%',
        videoId: schedule[0].videoId,
        playerVars: { rel: 0, modestbranding: 1, playsinline: 1, controls: 1, fs: 1 },
        events: {
          'onReady': function () {
            apiReady = true;
            if (muted) player.mute();
            var b = document.getElementById('goLiveBtn');
            if (b) { b.disabled = false; b.innerHTML = '&#9654; Go Live'; }
            if (live && current) {
              player.loadVideoById({ videoId: current.videoId, startSeconds: 0 });
              if (muted) player.mute(); else player.unMute();
            }
          },
          'onStateChange': function (e) {
            if (live && e.data === YT.PlayerState.ENDED) advance();
          },
          'onError': function () { if (live) advance(); }
        }
      });
    };

    function init() {
      fetch('games.json')
        .then(function (r) { return r.json(); })
        .then(function (games) {
          pool = buildPool(games);
          if (!pool.length) {
            elContent.innerHTML = '<div class="series-notice">No playable videos are available right now.</div>';
            return;
          }
          fillSchedule();
          renderStage();
          renderUpNext();
          var tag = document.createElement('script');
          tag.src = 'https://www.youtube.com/iframe_api';
          document.head.appendChild(tag);
        })
        .catch(function (err) {
          elContent.innerHTML = '<div class="series-notice">Could not load Cinema Mode. '
            + 'Please refresh the page.</div>';
          console.error(err);
        });
    }

    init();
  })();
  </script>
</body>
</html>
