<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live &mdash; Gaming Cinema</title>
  <meta name="description" content="Gaming Cinema Live - a non-stop trailer channel cycling through every PS5 Pro 4K walkthrough, five minutes at a time.">
  <meta name="robots" content="noindex">
  <meta property="og:title" content="Gaming Cinema Live">
  <meta property="og:type" content="website">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="brand">
        <a href="index.html">Gaming Cinema</a>
        <span class="tagline">PS5 Pro &middot; 4K HDR &middot; PSSR &middot; No Commentary</span>
      </div>
      <nav class="primary">
        <a href="index.html#games">Walkthroughs</a>
        <a href="live.html" class="nav-live">Live</a>
        <a href="https://www.youtube.com/@4k_gaming_cinema" target="_blank" rel="noopener">YouTube</a>
      </nav>
    </div>
  </header>

  <div class="live-page">
    <a href="index.html" class="back-link">&larr; All walkthroughs</a>
    <div id="liveContent"></div>
  </div>

  <footer class="site-footer">
    <p>&copy; 2026 Gaming Cinema &middot; No-commentary PS5 Pro 4K cinematic walkthroughs &middot; <a href="https://www.youtube.com/@4k_gaming_cinema" target="_blank" rel="noopener">YouTube Channel</a></p>
  </footer>

  <script>
  (function () {
    'use strict';

    var SEGMENT_MS = 5 * 60 * 1000;
    var SHOW_UPNEXT = 6;
    var SCHEDULE_AHEAD = 8;
    var TICKER_SPEED = 100;
    var DEFAULT_ANNOUNCE = 'Welcome to Gaming Cinema Live - fresh PS5 Pro 4K HDR walkthroughs every week. Subscribe on YouTube @4k_gaming_cinema';
    var DEFAULT_GAP = 8;
    var DEFAULT_LOGO_SIZE = 44;
    var DEFAULT_TXT_COLOR = '#ffffff';
    var DEFAULT_BG_COLOR = '#141414';
    var DEFAULT_TICKER_POS = 'bottom';
    var DEFAULT_TICKER_FONT = 16;

    var pool = [], bag = [], schedule = [], current = null;
    var player = null, apiReady = false, live = false;
    var muted = localStorage.getItem('gc_live_muted') === '1';
    var segTimeout = null, tickInt = null, segStart = 0;

    var announcements = [];
    var gapMs = DEFAULT_GAP * 1000;
    var tickerTimer = null, tickerIdx = 0;
    var tickerTextColor = DEFAULT_TXT_COLOR, tickerBgColor = DEFAULT_BG_COLOR;
    var tickerPos = DEFAULT_TICKER_POS, tickerFont = DEFAULT_TICKER_FONT;
    var logoData = '', logoSize = DEFAULT_LOGO_SIZE;

    var elContent = document.getElementById('liveContent');

    function secsFromDur(d) {
      if (!d) return 0;
      var p = String(d).split(':').map(Number);
      if (p.length === 3) return p[0] * 3600 + p[1] * 60 + p[2];
      if (p.length === 2) return p[0] * 60 + p[1];
      return p[0] || 0;
    }
    function pad(n) { return (n < 10 ? '0' : '') + n; }
    function fmtClock(s) {
      s = Math.max(0, Math.floor(s));
      var h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), x = s % 60;
      return h > 0 ? h + ':' + pad(m) + ':' + pad(x) : m + ':' + pad(x);
    }
    function fmtMS(s) {
      s = Math.max(0, Math.floor(s));
      return Math.floor(s / 60) + ':' + pad(s % 60);
    }
    function esc(s) {
      return String(s).replace(/[&<>"']/g, function (c) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
      });
    }
    function shuffle(a) {
      for (var i = a.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var t = a[i]; a[i] = a[j]; a[j] = t;
      }
      return a;
    }
    function partTxt(e) {
      return e.partCount > 1 ? 'Part ' + e.partIndex + ' / ' + e.partCount : 'Full walkthrough';
    }
    function parseAnn(text) {
      return String(text || '').split(/\r?\n/).map(function (s) { return s.trim(); })
        .filter(function (s) { return s.length > 0; });
    }

    function buildPool(games) {
      var p = [];
      games.forEach(function (g) {
        if (g.ageRestricted) return;
        (g.videos || []).forEach(function (v, i) {
          p.push({
            videoId: v.id, gameTitle: g.title, gameSlug: g.slug, year: g.year,
            partIndex: i + 1, partCount: (g.videos || []).length,
            durationSec: secsFromDur(v.duration)
          });
        });
      });
      return p;
    }
    function draw() {
      if (bag.length === 0) bag = shuffle(pool.slice());
      return bag.pop();
    }
    function makePick() {
      var e = draw();
      var maxStart = Math.max(0, e.durationSec - 320);
      var minStart = maxStart > 200 ? 90 : 0;
      var span = Math.max(1, maxStart - minStart);
      return { e: e, start: minStart + Math.floor(Math.random() * span) };
    }
    function fillSchedule() {
      while (schedule.length < SCHEDULE_AHEAD) schedule.push(makePick());
    }

    function renderStage() {
      elContent.innerHTML =
        '<div class="live-head">'
          + '<h1><span class="live-dot"></span> Gaming Cinema Live</h1>'
          + '<p class="series-meta">A non-stop trailer channel - every PS5 Pro 4K walkthrough, '
          + 'five minutes at a time, from a random moment. ' + pool.length + ' clips in rotation.</p>'
        + '</div>'
        + '<div class="live-stage">'
          + '<div class="player-wrap overlayed" id="playerWrap">'
            + '<div id="player"></div>'
            + '<div class="live-badge"><span class="bdot"></span> LIVE</div>'
            + '<img class="live-logo" id="liveLogo" alt="" style="display:none">'
            + '<div class="ticker pos-bottom" id="ticker"><div class="ticker-text" id="tickerText"></div></div>'
            + '<div class="player-overlay" id="overlay">'
              + '<div class="overlay-card">'
                + '<h3>Gaming Cinema Live</h3>'
                + '<p>A continuous trailer reel of every walkthrough on the channel. '
                + 'Press play and let it run - a fresh clip every five minutes.</p>'
                + '<div class="overlay-actions">'
                  + '<button class="overlay-btn primary" id="goLiveBtn" disabled>Loading&hellip;</button>'
                + '</div>'
              + '</div>'
            + '</div>'
          + '</div>'
          + '<div class="segment-bar"><div class="segment-fill" id="segFill"></div></div>'
          + '<div class="live-controls">'
            + '<div class="live-np" id="liveNp"></div>'
            + '<span class="seg-time" id="segTime">0:00 / 5:00</span>'
            + '<div class="live-actions">'
              + '<button class="np-btn" id="muteBtn">' + (muted ? 'Unmute' : 'Mute') + '</button>'
              + '<button class="np-btn" id="fsBtn">Fullscreen</button>'
              + '<button class="np-btn primary" id="skipBtn">Skip &#9197;</button>'
            + '</div>'
          + '</div>'
        + '</div>'
        + '<div class="upnext"><h2>Up Next</h2><div class="upnext-list" id="upnextList"></div></div>'
        + '<div class="panel" id="panel">'
          + '<button class="panel-toggle" id="panelToggle">'
            + '<span>&#9881; Broadcast settings</span><span class="chev">&#9662;</span>'
          + '</button>'
          + '<div class="panel-body">'
            + '<div class="panel-row">'
              + '<label for="annInput">Ticker announcements <span class="hint">one per line</span></label>'
              + '<textarea id="annInput" rows="3" placeholder="Type an announcement or ad message..."></textarea>'
            + '</div>'
            + '<div class="panel-grid">'
              + '<div class="panel-row">'
                + '<label for="gapInput">Repeat gap (seconds)</label>'
                + '<input type="number" id="gapInput" min="0" max="600" step="1">'
              + '</div>'
              + '<div class="panel-row">'
                + '<label for="tickerPos">Ticker position</label>'
                + '<select id="tickerPos">'
                  + '<option value="bottom">Bottom</option>'
                  + '<option value="middle">Middle</option>'
                  + '<option value="top">Top</option>'
                + '</select>'
              + '</div>'
              + '<div class="panel-row">'
                + '<label for="tickerFont">Ticker font size <span class="hint" id="tickerFontVal">16px</span></label>'
                + '<input type="range" id="tickerFont" min="12" max="30" step="1">'
              + '</div>'
              + '<div class="panel-row">'
                + '<label for="txtColor">Ticker text color</label>'
                + '<input type="color" id="txtColor">'
              + '</div>'
              + '<div class="panel-row">'
                + '<label for="bgColor">Ticker background</label>'
                + '<input type="color" id="bgColor">'
              + '</div>'
              + '<div class="panel-row">'
                + '<label for="logoInput">Company logo</label>'
                + '<input type="file" id="logoInput" accept="image/*">'
              + '</div>'
              + '<div class="panel-row">'
                + '<label for="logoSize">Logo size <span class="hint" id="logoSizeVal">44px</span></label>'
                + '<input type="range" id="logoSize" min="24" max="84" step="2">'
              + '</div>'
            + '</div>'
            + '<div class="panel-actions">'
              + '<span class="panel-note">Settings are saved in this browser only.</span>'
              + '<button class="np-btn" id="logoRemove">Remove logo</button>'
            + '</div>'
          + '</div>'
        + '</div>';

      document.getElementById('goLiveBtn').addEventListener('click', startLive);
      document.getElementById('skipBtn').addEventListener('click', function () { if (live) advance(); });
      document.getElementById('muteBtn').addEventListener('click', toggleMute);
      document.getElementById('fsBtn').addEventListener('click', toggleFullscreen);

      document.getElementById('panelToggle').addEventListener('click', function () {
        var p = document.getElementById('panel');
        p.classList.toggle('collapsed');
        localStorage.setItem('gc_live_panel', p.classList.contains('collapsed') ? 'collapsed' : 'open');
      });
      document.getElementById('annInput').addEventListener('change', function (e) {
        localStorage.setItem('gc_live_ticker', e.target.value);
        announcements = parseAnn(e.target.value);
        restartTicker();
      });
      document.getElementById('gapInput').addEventListener('change', function (e) {
        var v = parseInt(e.target.value, 10);
        if (isNaN(v) || v < 0) v = DEFAULT_GAP;
        if (v > 600) v = 600;
        e.target.value = v;
        gapMs = v * 1000;
        localStorage.setItem('gc_live_gap', String(v));
      });
      document.getElementById('tickerPos').addEventListener('change', function (e) {
        tickerPos = e.target.value;
        localStorage.setItem('gc_live_tickerpos', tickerPos);
        applyTickerPos();
      });
      document.getElementById('tickerFont').addEventListener('input', function (e) {
        tickerFont = parseInt(e.target.value, 10) || DEFAULT_TICKER_FONT;
        document.getElementById('tickerFontVal').textContent = tickerFont + 'px';
        localStorage.setItem('gc_live_tickerfont', String(tickerFont));
        applyTickerFont();
      });
      document.getElementById('txtColor').addEventListener('input', function (e) {
        tickerTextColor = e.target.value;
        localStorage.setItem('gc_live_txtcolor', tickerTextColor);
        applyTickerColors();
      });
      document.getElementById('bgColor').addEventListener('input', function (e) {
        tickerBgColor = e.target.value;
        localStorage.setItem('gc_live_bgcolor', tickerBgColor);
        applyTickerColors();
      });
      var ls = document.getElementById('logoSize');
      ls.addEventListener('input', function (e) {
        document.getElementById('logoSizeVal').textContent = e.target.value + 'px';
      });
      ls.addEventListener('change', function (e) {
        logoSize = parseInt(e.target.value, 10) || DEFAULT_LOGO_SIZE;
        localStorage.setItem('gc_live_logosize', String(logoSize));
        applyLogo();
      });
      document.getElementById('logoInput').addEventListener('change', function (e) {
        var file = e.target.files && e.target.files[0];
        if (!file) return;
        if (file.size > 2 * 1024 * 1024) {
          alert('That image is larger than 2 MB. Please use a smaller logo file.');
          e.target.value = '';
          return;
        }
        var reader = new FileReader();
        reader.onload = function (ev) {
          logoData = ev.target.result;
          try { localStorage.setItem('gc_live_logo', logoData); }
          catch (err) { alert('Could not save the logo - the image may be too large for browser storage.'); }
          applyLogo();
        };
        reader.readAsDataURL(file);
      });
      document.getElementById('logoRemove').addEventListener('click', function () {
        logoData = '';
        localStorage.removeItem('gc_live_logo');
        document.getElementById('logoInput').value = '';
        applyLogo();
      });

      document.addEventListener('fullscreenchange', onFsChange);
      document.addEventListener('webkitfullscreenchange', onFsChange);
    }

    function loadSettings() {
      var savedAnn = localStorage.getItem('gc_live_ticker');
      var annText = savedAnn != null ? savedAnn : DEFAULT_ANNOUNCE;
      document.getElementById('annInput').value = annText;
      announcements = parseAnn(annText);

      var savedGap = localStorage.getItem('gc_live_gap');
      var gap = savedGap != null ? parseInt(savedGap, 10) : DEFAULT_GAP;
      if (isNaN(gap) || gap < 0) gap = DEFAULT_GAP;
      gapMs = gap * 1000;
      document.getElementById('gapInput').value = gap;

      tickerPos = localStorage.getItem('gc_live_tickerpos') || DEFAULT_TICKER_POS;
      if (['top', 'middle', 'bottom'].indexOf(tickerPos) < 0) tickerPos = DEFAULT_TICKER_POS;
      document.getElementById('tickerPos').value = tickerPos;
      applyTickerPos();

      var savedFont = localStorage.getItem('gc_live_tickerfont');
      tickerFont = savedFont != null ? parseInt(savedFont, 10) : DEFAULT_TICKER_FONT;
      if (isNaN(tickerFont) || tickerFont < 8) tickerFont = DEFAULT_TICKER_FONT;
      document.getElementById('tickerFont').value = tickerFont;
      document.getElementById('tickerFontVal').textContent = tickerFont + 'px';
      applyTickerFont();

      tickerTextColor = localStorage.getItem('gc_live_txtcolor') || DEFAULT_TXT_COLOR;
      tickerBgColor = localStorage.getItem('gc_live_bgcolor') || DEFAULT_BG_COLOR;
      document.getElementById('txtColor').value = tickerTextColor;
      document.getElementById('bgColor').value = tickerBgColor;
      applyTickerColors();

      var savedSize = localStorage.getItem('gc_live_logosize');
      logoSize = savedSize != null ? parseInt(savedSize, 10) : DEFAULT_LOGO_SIZE;
      if (isNaN(logoSize)) logoSize = DEFAULT_LOGO_SIZE;
      document.getElementById('logoSize').value = logoSize;
      document.getElementById('logoSizeVal').textContent = logoSize + 'px';

      logoData = localStorage.getItem('gc_live_logo') || '';
      applyLogo();

      if (localStorage.getItem('gc_live_panel') === 'collapsed') {
        document.getElementById('panel').classList.add('collapsed');
      }
    }

    function applyTickerPos() {
      var t = document.getElementById('ticker');
      if (!t) return;
      t.classList.remove('pos-top', 'pos-middle', 'pos-bottom');
      t.classList.add('pos-' + tickerPos);
    }
    function applyTickerFont() {
      var tx = document.getElementById('tickerText');
      if (tx) tx.style.fontSize = tickerFont + 'px';
    }
    function applyTickerColors() {
      var tx = document.getElementById('tickerText');
      var t = document.getElementById('ticker');
      if (tx) tx.style.color = tickerTextColor;
      if (t) t.style.background = tickerBgColor;
    }
    function applyLogo() {
      var img = document.getElementById('liveLogo');
      if (!img) return;
      if (logoData) {
        img.src = logoData;
        img.style.height = logoSize + 'px';
        img.style.display = 'block';
      } else {
        img.removeAttribute('src');
        img.style.display = 'none';
      }
    }

    function restartTicker() {
      if (tickerTimer) { clearTimeout(tickerTimer); tickerTimer = null; }
      var t = document.getElementById('ticker');
      if (!t) return;
      if (!announcements.length) { t.style.display = 'none'; return; }
      t.style.display = 'block';
      cycleTicker(0);
    }
    function cycleTicker(i) {
      var t = document.getElementById('ticker');
      var tx = document.getElementById('tickerText');
      if (!t || !tx || !announcements.length) return;
      tickerIdx = i % announcements.length;
      tx.textContent = announcements[tickerIdx];
      var contW = t.clientWidth || 640;
      var textW = tx.offsetWidth || 240;
      var dur = Math.max(6, (contW + textW + 8) / TICKER_SPEED);
      tx.style.transition = 'none';
      tx.style.transform = 'translateX(' + contW + 'px)';
      void tx.offsetWidth;
      tx.style.transition = 'transform ' + dur.toFixed(2) + 's linear';
      tx.style.transform = 'translateX(' + (-textW - 8) + 'px)';
      tickerTimer = setTimeout(function () {
        tickerTimer = setTimeout(function () { cycleTicker(tickerIdx + 1); }, gapMs);
      }, dur * 1000);
    }

    function renderUpNext() {
      var list = document.getElementById('upnextList');
      if (!list) return;
      list.innerHTML = schedule.slice(0, SHOW_UPNEXT).map(function (p, i) {
        var e = p.e;
        return '<div class="upnext-item">'
          + '<span class="un-thumb" style="background-image:url(\'https://i.ytimg.com/vi/'
            + e.videoId + '/mqdefault.jpg\')"><span class="un-pos">' + (i + 1) + '</span></span>'
          + '<span class="un-info"><span class="un-title">' + esc(e.gameTitle) + '</span>'
          + '<span class="un-sub">' + partTxt(e) + ' &middot; from ' + fmtClock(p.start) + '</span>'
          + '</span></div>';
      }).join('');
    }
    function renderNp() {
      var n = document.getElementById('liveNp');
      if (!n || !current) return;
      n.innerHTML = '<span class="np-now">Now playing</span>'
        + '<span class="np-game">' + esc(current.e.gameTitle) + ' &middot; ' + partTxt(current.e) + '</span>';
    }
    function tick() {
      var el = Date.now() - segStart;
      var pct = Math.min(100, el / SEGMENT_MS * 100);
      var sf = document.getElementById('segFill');
      if (sf) sf.style.width = pct.toFixed(2) + '%';
      var st = document.getElementById('segTime');
      if (st) st.textContent = fmtMS(Math.min(SEGMENT_MS, el) / 1000) + ' / 5:00';
    }
    function toggleMute() {
      muted = !muted;
      localStorage.setItem('gc_live_muted', muted ? '1' : '0');
      if (player) { if (muted) player.mute(); else player.unMute(); }
      var b = document.getElementById('muteBtn');
      if (b) b.textContent = muted ? 'Unmute' : 'Mute';
    }

    function isFullscreen() {
      return !!(document.fullscreenElement || document.webkitFullscreenElement);
    }
    function toggleFullscreen() {
      var pw = document.getElementById('playerWrap');
      if (!pw) return;
      if (isFullscreen()) {
        if (document.exitFullscreen) document.exitFullscreen();
        else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
      } else {
        if (pw.requestFullscreen) pw.requestFullscreen();
        else if (pw.webkitRequestFullscreen) pw.webkitRequestFullscreen();
      }
    }
    function onFsChange() {
      var b = document.getElementById('fsBtn');
      if (b) b.textContent = isFullscreen() ? 'Exit fullscreen' : 'Fullscreen';
      restartTicker();
    }

    function beginSegment() {
      segStart = Date.now();
      if (segTimeout) clearTimeout(segTimeout);
      if (tickInt) clearInterval(tickInt);
      segTimeout = setTimeout(advance, SEGMENT_MS);
      tickInt = setInterval(tick, 1000);
      renderNp();
      renderUpNext();
      tick();
      if (apiReady && player) {
        player.loadVideoById({ videoId: current.e.videoId, startSeconds: current.start });
        if (muted) player.mute(); else player.unMute();
      }
    }
    function advance() {
      current = schedule.shift();
      fillSchedule();
      beginSegment();
    }
    function startLive() {
      if (live) return;
      live = true;
      var pw = document.getElementById('playerWrap');
      if (pw) pw.classList.remove('overlayed');
      advance();
    }

    window.onYouTubeIframeAPIReady = function () {
      player = new YT.Player('player', {
        width: '100%',
        height: '100%',
        videoId: schedule[0].e.videoId,
        playerVars: { rel: 0, modestbranding: 1, playsinline: 1, controls: 0 },
        events: {
          'onReady': function () {
            apiReady = true;
            if (muted) player.mute();
            var b = document.getElementById('goLiveBtn');
            if (b) { b.disabled = false; b.innerHTML = '&#9654; Go Live'; }
            if (live && current) {
              player.loadVideoById({ videoId: current.e.videoId, startSeconds: current.start });
              if (muted) player.mute(); else player.unMute();
            }
          },
          'onError': function () { if (live) advance(); },
          'onStateChange': function () {}
        }
      });
    };

    function init() {
      fetch('games.json')
        .then(function (r) { return r.json(); })
        .then(function (games) {
          pool = buildPool(games);
          if (!pool.length) {
            elContent.innerHTML = '<div class="series-notice">No playable videos are available right now.</div>';
            return;
          }
          fillSchedule();
          renderStage();
          loadSettings();
          renderUpNext();
          restartTicker();
          var tag = document.createElement('script');
          tag.src = 'https://www.youtube.com/iframe_api';
          document.head.appendChild(tag);
        })
        .catch(function (err) {
          elContent.innerHTML = '<div class="series-notice">Could not load the live channel. '
            + 'Please refresh the page.</div>';
          console.error(err);
        });
    }

    init();
  })();
  </script>
</body>
</html>
